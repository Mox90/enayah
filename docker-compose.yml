services:
  db:
    image: postgres:15
    container_name: enayah-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enayah_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./enayah-backend
    container_name: enayah-backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '4000:4000'
    env_file:
      - ./enayah-backend/.env
    volumes:
      - ./enayah-backend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
