services:
  db:
    image: postgres:15
    container_name: enayah-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enayah_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

redis:
  image: redis:7
  container_name: enayah-redis
  restart: always
  environment:
    REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
  command: sh -c 'exec redis-server --requirepass "$$REDIS_PASSWORD"'
  ports:
    - '6379:6379'
  healthcheck:
    test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
    interval: 5s
    timeout: 5s
    retries: 5
    volumes:
      - redis_data:/data

  backend:
    build: ./enayah-backend
    container_name: enayah-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '4000:4000'
    env_file:
      - ./enayah-backend/.env
    volumes:
      - ./enayah-backend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
