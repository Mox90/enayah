services:
  db:
    image: postgres:15
    container_name: enayah-postgres
    restart: always
    env_file:
      - .env
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./enayah-backend
    container_name: enayah-backend
    depends_on:
      - db
    ports:
      - '3000:3000'
    env_file:
      - .env
    volumes:
      - ./enayah-backend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
